<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Photo Colorizer</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#0e0e52,#2c5483,#4361ee);
    padding:20px;
}

.container{
    width:550px;
    background:rgba(255,255,255,0.12);
    backdrop-filter:blur(15px);
    border:1px solid rgba(255,255,255,0.2);
    padding:35px;
    border-radius:25px;
    box-shadow:0 15px 35px rgba(223, 156, 156, 0.35);
    text-align:center;
    color:rgb(255, 255, 255);
}

.logo{
    font-size:42px;
    margin-bottom:10px;
}

h1{
    font-size:32px;
    margin-bottom:8px;
}

.subtitle{
    color:#e0e0e0;
    margin-bottom:25px;
    font-size:15px;
}

.drop-box{
    border:2px dashed rgba(255,255,255,0.5);
    padding:40px 20px;
    border-radius:20px;
    cursor:pointer;
    transition:0.3s;
    background:rgba(255,255,255,0.05);
}

.drop-box:hover{
    background:rgba(255,255,255,0.12);
    transform:translateY(-3px);
}

.drop-box.dragover{
    border-color:#fff;
    background:rgba(255,255,255,0.15);
}

.drop-box h3{
    font-size:20px;
    margin-bottom:10px;
}

.drop-box p{
    font-size:14px;
    color:#ddd;
}

input[type=file]{
    display:none;
}

.preview-box{
    margin-top:22px;
}

img{
    width:100%;
    max-height:320px;
    object-fit:contain;
    border-radius:18px;
    display:none;
    border:2px solid rgba(255,255,255,0.25);
}

button{
    width:100%;
    margin-top:22px;
    padding:15px;
    border:none;
    border-radius:14px;
    background:white;
    color:#222;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    transform:scale(1.03);
    background:#f2f2f2;
}

#status{
    margin-top:16px;
    font-size:15px;
    color:#fff;
}

.footer{
    margin-top:18px;
    font-size:13px;
    color:#ddd;
}
</style>
</head>

<body>

<div class="container">

    <div class="logo">🎨</div>
    <h1>AI Photo Colorizer</h1>

    <div class="drop-box" id="dropArea">
        <h3>Drag & Drop Image Here</h3>
        <p>or click to browse files</p>
        <input type="file" id="fileInput" accept="image/*">
    </div>

    <div class="preview-box">
        <img id="preview">
    </div>

    <button onclick="uploadImage()">✨ Convert to Color</button>

    <p id="status"></p>

    

</div>

<script>
const dropArea = document.getElementById("dropArea");
const fileInput = document.getElementById("fileInput");
const preview = document.getElementById("preview");
const statusText = document.getElementById("status");

dropArea.addEventListener("click", () => fileInput.click());

fileInput.addEventListener("change", function(){
    showPreview(this.files[0]);
});

dropArea.addEventListener("dragover", (e)=>{
    e.preventDefault();
    dropArea.classList.add("dragover");
});

dropArea.addEventListener("dragleave", ()=>{
    dropArea.classList.remove("dragover");
});

dropArea.addEventListener("drop", (e)=>{
    e.preventDefault();
    dropArea.classList.remove("dragover");

    const file = e.dataTransfer.files[0];
    fileInput.files = e.dataTransfer.files;

    showPreview(file);
});

function showPreview(file){
    if(file){
        const reader = new FileReader();

        reader.onload = function(e){
            preview.src = e.target.result;
            preview.style.display = "block";
        }

        reader.readAsDataURL(file);
    }
}

function uploadImage(){

    const file = fileInput.files[0];

    if(!file){
        alert("Please upload image first");
        return;
    }

    statusText.innerHTML = "⏳ Processing...";

    let formData = new FormData();
    formData.append("image", file);

    fetch("/upload",{
        method:"POST",
        body:formData
    })
    .then(response => response.blob())
    .then(blob => {
        const url = URL.createObjectURL(blob);
        preview.src = url;
        statusText.innerHTML = "✅ Image Colorized Successfully";
    })
    .catch(error => {
        statusText.innerHTML = "❌ Error while processing";
    });
}
</script>

</body>
</html>
